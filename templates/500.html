<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#0f1115">
    <title>Serviço temporariamente indisponível — DivisorPDF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f1115;
            --blue: #2563eb;
            --blue-light: #3b82f6;
            --on-dark: #ffffff;
            --on-dark-soft: #9aa3b2;
            --font-sans: "Inter", system-ui, -apple-system, sans-serif;
            --font-display: "Manrope", "Inter", sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans);
            background: #eef0f4;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }
        .panel {
            position: relative;
            overflow: hidden;
            width: min(100%, 480px);
            background: var(--ink);
            color: var(--on-dark);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px rgba(15, 17, 21, 0.18);
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .glow {
            position: absolute;
            top: -8rem;
            left: -6rem;
            width: 26rem;
            height: 26rem;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.18);
            filter: blur(120px);
            pointer-events: none;
        }
        .inner { position: relative; z-index: 2; }
        .icon {
            width: 3rem;
            height: 3rem;
            margin: 0 auto 1.5rem;
            border-radius: 1rem;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            line-height: 1.15;
            margin-bottom: 0.75rem;
        }
        p {
            color: var(--on-dark-soft);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.75rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            background: var(--blue);
            color: #fff;
            font-weight: 500;
            font-size: 0.95rem;
            text-decoration: none;
            box-shadow: 0 0 22px rgba(37, 99, 235, 0.3);
            transition: background 180ms ease;
        }
        .btn:hover { background: #1d4ed8; }
        .foot {
            margin-top: 2rem;
            color: var(--on-dark-soft);
            font-size: 0.78rem;
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="glow" aria-hidden="true"></div>
        <div class="inner">
            <div class="icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            </div>
            <h1>Serviço temporariamente indisponível</h1>
            <p>Estamos enfrentando uma instabilidade momentânea. Por favor, tente novamente em alguns instantes.</p>
            <a class="btn" href="/">Tentar novamente</a>
            <p class="foot">DivisorPDF · um app Stölben</p>
        </div>
    </div>
</body>
</html>
