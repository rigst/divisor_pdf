<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Serviço temporariamente indisponível — DivisorPDF</title>
    <style>
        :root {
            --bg: #eef1f6;
            --surface: #ffffff;
            --border: #e3e8ef;
            --brand: #2563eb;
            --text: #0f172a;
            --text-2: #475569;
            --text-3: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(1200px 480px at 50% -10%, rgba(37, 99, 235, 0.07), transparent 70%);
            background-repeat: no-repeat;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            width: min(100%, 460px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 18px 40px -12px rgba(15, 23, 42, 0.20);
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.25rem;
            border-radius: 12px;
            background: #eef4ff;
            color: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            margin-bottom: 0.6rem;
        }
        p {
            color: var(--text-2);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 9px;
            background: var(--brand);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            box-shadow: 0 1px 2px rgba(37, 99, 235, 0.25);
        }
        .btn:hover { background: #1d4ed8; }
        .foot {
            margin-top: 1.75rem;
            color: var(--text-3);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </div>
        <h1>Serviço temporariamente indisponível</h1>
        <p>Estamos enfrentando uma instabilidade momentânea. Por favor, tente novamente em alguns instantes.</p>
        <a class="btn" href="/">Tentar novamente</a>
        <p class="foot">DivisorPDF · Processamento seguro de documentos</p>
    </div>
</body>
</html>
