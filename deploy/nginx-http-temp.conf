# ============================================================
# Nginx TEMPORÁRIO — DivisorPDF (somente HTTP, antes do certificado)
# Use este arquivo enquanto o HTTPS ainda não foi emitido.
# Depois de emitir o certificado, troque por deploy/nginx.conf.
# ============================================================

upstream divisor_pdf_app {
    server unix:/var/www/divisor_pdf/divisor_pdf.sock fail_timeout=0;
}

server {
    listen 80;
    server_name divisor.stolben.com;

    # Validação do Let's Encrypt (webroot) — usada ao emitir o certificado
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 2048M;
    keepalive_timeout 5;

    access_log /var/log/nginx/divisor_pdf.access.log;
    error_log /var/log/nginx/divisor_pdf.error.log info;

    location /static/ {
        alias /var/www/divisor_pdf/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        return 404;
    }

    location / {
        try_files $uri @proxy_to_app;
    }

    location @proxy_to_app {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://divisor_pdf_app;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    error_page 500 502 503 504 /500.html;
    location = /500.html {
        root /var/www/divisor_pdf/templates/;
        internal;
    }
}
