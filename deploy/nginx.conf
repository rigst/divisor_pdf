# ============================================================
# Nginx — DivisorPDF (HTTP -> HTTPS)
# ============================================================
# Antes de usar:
#   1. Troque todas as ocorrências de SEU_DOMINIO pelo domínio real.
#   2. Crie o diretório do desafio ACME:  sudo mkdir -p /var/www/certbot
#   3. Emita o certificado (veja DEPLOY.md, passo de HTTPS) ANTES de
#      habilitar o bloco 443 — senão o nginx falha por não achar o cert.
# ============================================================

upstream divisor_pdf_app {
    server unix:/home/rodrigostolben/Projetos/divisor_pdf/divisor_pdf.sock fail_timeout=0;
}

# ---------- HTTP: desafio ACME + redirect para HTTPS ----------
server {
    listen 80;
    server_name SEU_DOMINIO;

    # Validação do Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo o resto vai para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS: aplicação ----------
server {
    listen 443 ssl;
    http2 on;
    server_name SEU_DOMINIO;

    # Certificados (Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;

    # Parâmetros de SSL recomendados
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # Se usar certbot, ele também fornece estes (opcional):
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Deve acompanhar MAX_TOTAL_UPLOAD_MB no .env.
    client_max_body_size 2048M;

    keepalive_timeout 5;

    # Logs
    access_log /var/log/nginx/divisor_pdf.access.log;
    error_log /var/log/nginx/divisor_pdf.error.log info;

    # Arquivos estáticos do Django
    location /static/ {
        alias /home/rodrigostolben/Projetos/divisor_pdf/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Downloads temporários devem passar pela view Django, que valida sessão/status.
    location /media/ {
        return 404;
    }

    # Requisições dinâmicas para o Gunicorn
    location / {
        try_files $uri @proxy_to_app;
    }

    location @proxy_to_app {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        # Evita redirecionamentos indesejados no Gunicorn
        proxy_redirect off;
        proxy_pass http://divisor_pdf_app;

        # Timeouts maiores para uploads e processamentos longos
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Página de erro customizada (Gunicorn fora do ar etc.)
    error_page 500 502 503 504 /500.html;
    location = /500.html {
        root /home/rodrigostolben/Projetos/divisor_pdf/templates/;
        internal;
    }
}
